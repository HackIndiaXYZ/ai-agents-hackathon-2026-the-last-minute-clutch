# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  NyayaEval — Infrastructure Services                                       ║
# ║                                                                             ║
# ║  Neo4j 5.x  : Knowledge Graph for legal entity relationships               ║
# ║  Redis 7.x  : Caching layer + LangGraph checkpoint persistence             ║
# ║                                                                             ║
# ║  Usage:                                                                     ║
# ║    docker compose up -d          # Start all services                       ║
# ║    docker compose down -v        # Tear down with volume cleanup            ║
# ║    docker compose logs -f neo4j  # Tail Neo4j logs                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:
  # ─── Neo4j Knowledge Graph ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: nyayaeval-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt protocol
    environment:
      # Authentication — override via .env for production
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-nyayaeval_dev_password}"
      # Memory configuration — tune for your hardware
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512m"
      # Enable APOC plugin for advanced graph procedures (path expansion,
      # schema introspection, data import utilities)
      NEO4J_PLUGINS: '["apoc"]'
      # APOC security — allow file import and unrestricted procedures
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nyayaeval-net

  # ─── Redis Cache & Checkpoint Store ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nyayaeval-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - nyayaeval-net

# ─── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_plugins:
    driver: local
  redis_data:
    driver: local

# ─── Network ───────────────────────────────────────────────────────────────────
networks:
  nyayaeval-net:
    driver: bridge
